<style>
:root{
  --bg:#FFFBF5;--card:#FFFFFF;--ink:#351E28;--muted:#6B5B62;
  --primary:#FF5C34;--primary-dark:#E04820;
  --border:#AEB8A0;--border-light:#CDD4C5;
  --bg-editorial:#D7EFFF;--shadow:0 2px 12px rgba(120,100,80,0.06);
  --font-body:'Jost',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);line-height:1.7;}
.site-nav{background:#fff;border-bottom:1px solid var(--border-light);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--ink);}
.nav-logo svg{width:32px;height:48px;flex-shrink:0;}
.nav-wordmark{font-family:var(--font-body);font-size:1.1rem;font-weight:700;letter-spacing:-0.01em;}
.nav-wordmark span{color:var(--primary);}
.nav-links{display:flex;align-items:center;gap:1.5rem;}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--muted);text-decoration:none;transition:color 0.15s;}
.nav-links a:hover{color:var(--ink);}
.nav-links .signin-link{padding:0.5rem 1.25rem;border:2px solid var(--primary);color:var(--primary);border-radius:6px;font-size:0.85rem;font-weight:600;text-decoration:none;transition:background 0.15s,color 0.15s;}
.nav-links .signin-link:hover{background:var(--primary);color:#fff;}
.nav-links .signup-btn{padding:0.5rem 1.25rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:6px;font-weight:600;font-size:0.85rem;box-shadow:0 2px 8px rgba(255,92,52,0.25);text-decoration:none;}
.nav-links .signup-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,92,52,0.35);}
@media(max-width:640px){.nav-links .nav-hide{display:none;}}
.hero{background:linear-gradient(180deg,#D7EFFF 0%,#EEF7FF 60%,var(--bg) 100%);border-bottom:3px solid var(--primary);padding:3.5rem 2rem 2.5rem;text-align:center;}
.hero-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:0.75rem;}
.hero h1{font-family:var(--font-body);font-size:2.4rem;font-weight:700;color:var(--primary);line-height:1.15;margin-bottom:1rem;max-width:700px;margin-left:auto;margin-right:auto;}
.hero .hook{font-size:1.05rem;color:var(--muted);max-width:560px;margin:0 auto 1.25rem;}
.badges{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;}
.badge{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:0.3rem 0.75rem;border-radius:20px;background:var(--ink);color:#fff;}
.page-wrap{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;display:grid;grid-template-columns:1fr 300px;gap:3rem;align-items:start;}
@media(max-width:900px){.page-wrap{grid-template-columns:1fr;}}
article{min-width:0;}
article h2{font-family:var(--font-body);font-size:1.15rem;font-weight:600;color:var(--muted);border-left:3px solid var(--primary);padding-left:0.75rem;margin:2rem 0 0.75rem;}
article p{font-size:1rem;color:#4A3A42;line-height:1.75;margin-bottom:1.25rem;}.bf-cta p{color:#fff;font-size:0.95rem;}
article p:first-of-type{font-size:1.13rem;line-height:1.8;color:var(--ink);padding-left:1rem;border-left:3px solid var(--author-color,var(--primary));margin-bottom:1.5rem;}
article p:first-of-type::first-letter{font-size:3.2em;font-weight:700;color:var(--author-color,var(--primary));float:left;line-height:0.85;margin:0.05em 0.1em 0 0;}
article em{font-style:italic;color:var(--author-color,var(--primary-dark));font-weight:500;}
.article-body p:last-of-type{font-style:italic;color:var(--muted);border-top:1px solid var(--border-light);padding-top:1.25rem;margin-top:0.5rem;}
article p+p{margin-top:0.25rem;}
article p em{font-style:italic;color:var(--ink);}
article .author-voice{font-size:0.9rem;color:var(--muted);border-left:2px solid var(--border);padding-left:1rem;margin-top:1.5rem;line-height:1.65;}
.writers{background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:1.5rem;position:sticky;top:72px;}
.writers h2{font-family:var(--font-body);font-size:0.8rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--primary);margin-bottom:1rem;}
.writers-grid{display:flex;flex-direction:column;gap:0.75rem;}
.writer-card{background:var(--card);border-radius:10px;padding:0.7rem 1rem 0.7rem 1.1rem;border:1px solid var(--border-light);border-left:4px solid var(--author-color,var(--primary));display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:var(--ink);margin-bottom:0.5rem;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;}.writer-card::after{content:'';position:absolute;top:0;right:0;width:35%;height:100%;background:linear-gradient(225deg,rgba(215,239,255,0.45) 0%,transparent 70%);pointer-events:none;border-radius:0 10px 10px 0;}.writer-card:hover{transform:translateX(2px);box-shadow:var(--shadow);}
.writer-flag{font-size:1.2rem;flex-shrink:0;}
.writer-info{flex:1;min-width:0;}
.writer-name{display:block;font-size:0.88rem;font-weight:600;color:var(--ink);}
.writer-book{display:block;font-size:0.8rem;color:var(--ink);font-style:italic;font-weight:500;}
.writer-store{font-size:0.72rem;font-weight:600;color:var(--primary);white-space:nowrap;flex-shrink:0;margin-left:auto;}
.writer-link:hover{color:var(--primary-dark);}
.blog-footer-block{max-width:1100px;margin:0 auto 2rem;padding:0 2rem;}
.bf-writers-link{margin-bottom:1.25rem;}
.bf-writers-link a{font-size:0.9rem;color:var(--primary);text-decoration:none;font-weight:500;}
.bf-dowrite{background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;}
.bf-dowrite h2{font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:0.5rem;}
.bf-dowrite p{font-size:0.92rem;color:var(--muted);line-height:1.65;}
.bf-cta{background:var(--primary);border-radius:10px;padding:1.5rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.bf-cta p{color:#fff;font-weight:500;font-size:0.95rem;}
.bf-cta-btn{background:#fff;color:var(--primary);font-weight:700;font-size:0.88rem;padding:0.5rem 1.25rem;border-radius:6px;text-decoration:none;white-space:nowrap;}
.bf-cta-btn:hover{background:#fff3f0;}
.bf-cta-pro{background:var(--ink);}
.bf-related{margin-top:1.5rem;}
.bf-related h3{font-size:0.78rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--muted);margin-bottom:0.75rem;}
.bf-pills{display:flex;flex-wrap:wrap;gap:0.5rem;}
.related-pill{font-size:0.75rem;font-weight:600;padding:0.3rem 0.7rem;border-radius:20px;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;}
.site-footer{background:var(--ink);color:rgba(255,255,255,0.7);text-align:center;padding:2rem;font-size:0.82rem;}
.site-footer a{color:rgba(255,255,255,0.5);text-decoration:none;}
.site-footer a:hover{color:#fff;}
</style>
</head>
