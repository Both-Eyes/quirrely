<!-- Social Share Component for Blog Posts -->
<div class="social-share" style="
  margin: 2rem 0;
  padding: 1.5rem;
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  border-radius: 16px;
  border-left: 4px solid var(--primary, #FF6B6B);
">
  <h4 style="margin-bottom: 1rem; color: var(--ink, #2D3436); font-size: 1.1rem;">
    📢 Share this writing insight
  </h4>
  
  <div class="share-buttons" style="
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  ">
    <button onclick="shareTwitter()" 
            data-track="social_share" 
            data-platform="twitter"
            style="
              background: #1DA1F2;
              color: white;
              border: none;
              padding: 0.6rem 1rem;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 0.5rem;
              transition: transform 0.2s ease;
            "
            onmouseover="this.style.transform='scale(1.05)'"
            onmouseout="this.style.transform='scale(1)'">
      <span>🐦</span> Twitter
    </button>
    
    <button onclick="shareLinkedIn()" 
            data-track="social_share" 
            data-platform="linkedin"
            style="
              background: #0A66C2;
              color: white;
              border: none;
              padding: 0.6rem 1rem;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 0.5rem;
              transition: transform 0.2s ease;
            "
            onmouseover="this.style.transform='scale(1.05)'"
            onmouseout="this.style.transform='scale(1)'">
      <span>💼</span> LinkedIn
    </button>
    
    <button onclick="shareFacebook()" 
            data-track="social_share" 
            data-platform="facebook"
            style="
              background: #1877F2;
              color: white;
              border: none;
              padding: 0.6rem 1rem;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 0.5rem;
              transition: transform 0.2s ease;
            "
            onmouseover="this.style.transform='scale(1.05)'"
            onmouseout="this.style.transform='scale(1)'">
      <span>📘</span> Facebook
    </button>
    
    <button onclick="shareReddit()" 
            data-track="social_share" 
            data-platform="reddit"
            style="
              background: #FF4500;
              color: white;
              border: none;
              padding: 0.6rem 1rem;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 0.5rem;
              transition: transform 0.2s ease;
            "
            onmouseover="this.style.transform='scale(1.05)'"
            onmouseout="this.style.transform='scale(1)'">
      <span>🔗</span> Reddit
    </button>
    
    <button onclick="copyLink()" 
            data-track="social_share" 
            data-platform="link"
            style="
              background: var(--muted, #636E72);
              color: white;
              border: none;
              padding: 0.6rem 1rem;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 0.5rem;
              transition: transform 0.2s ease;
            "
            onmouseover="this.style.transform='scale(1.05)'"
            onmouseout="this.style.transform='scale(1)'">
      <span>🔗</span> Copy Link
    </button>
  </div>
  
  <p style="
    font-size: 0.8rem;
    color: var(--muted, #636E72);
    margin-top: 1rem;
    font-style: italic;
  ">
    Help other writers discover their voice. Every share matters. 🙏
  </p>
</div>

<script>
// Social sharing functions with analytics tracking
function shareTwitter() {
  trackSocialShare('twitter');
  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent(document.title + ' | Discover your writing voice with Quirrely');
  window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}&via=quirrelyapp`, '_blank', 'width=600,height=400');
}

function shareLinkedIn() {
  trackSocialShare('linkedin');
  const url = encodeURIComponent(window.location.href);
  window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank', 'width=600,height=400');
}

function shareFacebook() {
  trackSocialShare('facebook');
  const url = encodeURIComponent(window.location.href);
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'width=600,height=400');
}

function shareReddit() {
  trackSocialShare('reddit');
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title);
  window.open(`https://reddit.com/submit?url=${url}&title=${title}`, '_blank', 'width=600,height=600');
}

function copyLink() {
  trackSocialShare('link');
  navigator.clipboard.writeText(window.location.href).then(function() {
    // Show success message
    const button = event.target.closest('button');
    const originalText = button.innerHTML;
    button.innerHTML = '<span>✅</span> Copied!';
    button.style.background = '#28a745';
    
    setTimeout(() => {
      button.innerHTML = originalText;
      button.style.background = 'var(--muted, #636E72)';
    }, 2000);
  });
}

// Analytics tracking function
function trackSocialShare(platform) {
  // Track via Meta Events API
  if (typeof fetch !== 'undefined') {
    fetch('/api/meta/events', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        event: 'social_share',
        data: {
          platform: platform,
          page_url: window.location.href,
          page_title: document.title,
          timestamp: Date.now()
        },
        sessionId: getSessionId ? getSessionId() : 'anonymous',
        userId: getCurrentUserId ? getCurrentUserId() : null
      })
    }).catch(e => console.log('Analytics tracking failed:', e));
  }
  
  // Also track via GTM/GA if available
  if (typeof gtag !== 'undefined') {
    gtag('event', 'share', {
      method: platform,
      content_type: 'blog_post',
      content_id: window.location.pathname
    });
  }
  
  console.log(`📊 Tracked social share: ${platform}`);
}

// Session utilities (implement based on your session system)
function getSessionId() {
  // Return current session ID - implement based on your system
  return sessionStorage.getItem('session_id') || 'anonymous';
}

function getCurrentUserId() {
  // Return current user ID if logged in - implement based on your auth system
  return localStorage.getItem('user_id') || null;
}
</script>

<!-- CSS for mobile responsiveness -->
<style>
@media (max-width: 600px) {
  .share-buttons {
    flex-direction: column;
    align-items: stretch;
  }
  
  .share-buttons button {
    justify-content: center;
    padding: 0.8rem 1rem;
  }
}

.social-share {
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
