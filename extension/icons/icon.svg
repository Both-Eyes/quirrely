<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1A202C"/>
  
  <!-- Squirrel body -->
  <ellipse cx="64" cy="88" rx="22" ry="16" fill="#E8E4E1"/>
  
  <!-- Squirrel head -->
  <circle cx="64" cy="52" r="28" fill="#E8E4E1"/>
  
  <!-- Ears -->
  <ellipse cx="45" cy="30" rx="8" ry="12" fill="#E8E4E1"/>
  <ellipse cx="83" cy="30" rx="8" ry="12" fill="#E8E4E1"/>
  
  <!-- Inner ears -->
  <ellipse cx="45" cy="32" rx="4" ry="6" fill="#CBD5E0"/>
  <ellipse cx="83" cy="32" rx="4" ry="6" fill="#CBD5E0"/>
  
  <!-- Eyes -->
  <circle cx="54" cy="48" r="5" fill="#2D3748"/>
  <circle cx="74" cy="48" r="5" fill="#2D3748"/>
  
  <!-- Eye highlights -->
  <circle cx="56" cy="46" r="1.5" fill="white"/>
  <circle cx="76" cy="46" r="1.5" fill="white"/>
  
  <!-- Nose (coral acorn shape) -->
  <ellipse cx="64" cy="60" rx="4" ry="3" fill="#FF6B5A"/>
  
  <!-- Tail -->
  <ellipse cx="95" cy="70" rx="12" ry="28" fill="#E8E4E1" transform="rotate(25 95 70)"/>
  
  <!-- Coral ring accent -->
  <circle cx="64" cy="64" r="58" stroke="#FF6B5A" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
