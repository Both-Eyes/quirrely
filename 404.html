<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/css/compat.css">
  <script src="/assets/js/compat.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Quirrely</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/logo/apple-touch-icon.svg">
  <style>
    :root {
      --bg: #FFFBF5;
      --ink: #2D3436;
      --primary: #FF6B6B;
      --muted: #636E72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo-link {
      position: absolute;
      top: 2rem;
      left: 2rem;
      text-decoration: none;
    }
    .content { max-width: 400px; }
    .squirrel {
      width: 120px;
      height: auto;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <a href="/" class="logo-link">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="140" height="41">

        <path d="M60 68 Q68 72, 66 80 Q64 86, 56 88 L48 86" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.8"/>
        <ellipse cx="28" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
        <ellipse cx="52" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
        <ellipse cx="40" cy="78" rx="9" ry="4" fill="#E85A5A"/><rect x="38.5" y="74" width="3" height="4" rx="1.5" fill="#D4504A"/><path d="M31 78 Q30 94, 40 99 Q50 94, 49 78 Z" fill="#FF6B6B"/>

        <ellipse cx="24" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="56" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="32" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>

      <text x="105" y="62" font-family="system-ui, sans-serif" font-size="46" font-weight="700" fill="#2D3436">Quir<tspan fill="#FF6B6B">rel</tspan><tspan fill="#2D3436" font-style="italic" font-weight="500">ly</tspan></text>
    </svg>
  </a>
  
  <div class="content">
    <!-- Sad squirrel without treasure -->
    <svg class="squirrel" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 135" width="120" height="162">
      <path d="M58 112 Q85 98, 94 62 Q100 26, 74 8 Q50 -8, 42 22 Q38 44, 54 60 Q70 78, 62 100 Q58 110, 58 112" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2" opacity="0.7"/>

      <ellipse cx="48" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
      <circle cx="33" cy="46.5" r="2" fill="#FFF"/>
      <circle cx="49" cy="46.5" r="2" fill="#FFF"/>

      <path d="M37 66 Q40 63, 43 66" stroke="#C4B8AC" stroke-width="0.8" fill="none"/>
    </svg>
    
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Go Home</a>

</html>
