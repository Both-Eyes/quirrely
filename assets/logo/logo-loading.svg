<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Quirrely Loading with Acorn Nut Animation -->
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes glow { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.15); opacity: 0; } }
    .nut-body { animation: pulse 1.5s ease-in-out infinite; }
    .nut-glow { animation: glow 1.5s ease-in-out infinite; transform-origin: 40px 88px; }
  </style>
  <!-- Tail -->
  <path d="M58 112 Q85 98, 94 62 Q100 26, 74 8 Q50 -8, 42 22 Q38 44, 54 60 Q70 78, 62 100" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
  <!-- Body -->
  <ellipse cx="40" cy="98" rx="22" ry="26" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
  <!-- Paws -->
  <ellipse cx="28" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
  <ellipse cx="52" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
  <!-- ACORN NUT with glow -->
  <ellipse class="nut-glow" cx="40" cy="88" rx="14" ry="16" fill="#FF6B6B"/>
  <ellipse cx="40" cy="78" rx="9" ry="4" fill="#E85A5A"/>
  <rect x="38.5" y="74" width="3" height="4" rx="1.5" fill="#D4504A"/>
  <path class="nut-body" d="M31 78 Q30 94, 40 99 Q50 94, 49 78 Z" fill="#FF6B6B"/>
  <path d="M34 82 Q33 90, 40 94 Q41 92, 40 82 Z" fill="#FF8E8E" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="40" cy="50" rx="22" ry="20" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
  <ellipse cx="24" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
  <ellipse cx="56" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
  <ellipse cx="32" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
  <ellipse cx="48" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
  <circle cx="33" cy="46.5" r="2" fill="#FFF"/>
  <circle cx="49" cy="46.5" r="2" fill="#FFF"/>
  <ellipse cx="40" cy="60" rx="4.5" ry="3.5" fill="#4A4A4A"/>
</svg>
