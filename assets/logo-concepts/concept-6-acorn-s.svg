<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- The S is a squirrel -->
  <g transform="translate(10, 5)">
    <!-- Squirrel body forming S shape -->
    <path d="M25 8 
             Q35 5, 38 12 
             Q40 18, 32 22 
             Q24 26, 22 32 
             Q20 40, 28 45 
             Q36 50, 40 45" 
          fill="none" stroke="#FF6B6B" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Head at top of S -->
    <circle cx="25" cy="10" r="8" fill="#FFFBF5" stroke="#2D3436" stroke-width="1.5"/>
    
    <!-- Ears -->
    <ellipse cx="20" cy="4" rx="3" ry="5" fill="#FFFBF5" stroke="#2D3436" stroke-width="1"/>
    <ellipse cx="28" cy="3" rx="3" ry="5" fill="#FFFBF5" stroke="#2D3436" stroke-width="1"/>
    
    <!-- Eye -->
    <circle cx="27" cy="9" r="2" fill="#2D3436"/>
    <circle cx="27.5" cy="8.5" r="0.7" fill="#FFFBF5"/>
    
    <!-- Tail at bottom of S -->
    <path d="M40 45 Q48 42, 50 35 Q52 28, 45 25" 
          fill="none" stroke="#2D3436" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Rest of wordmark -->
  <text x="60" y="42" font-family="Outfit, system-ui, sans-serif" font-size="28" font-weight="700" fill="#2D3436">
    entense
  </text>
</svg>
