<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <!-- Squirrel peeking over text line -->
  <g transform="translate(70, 0)">
    <!-- Ears -->
    <ellipse cx="22" cy="8" rx="6" ry="10" fill="#FFFBF5" stroke="#2D3436" stroke-width="1.5"/>
    <ellipse cx="22" cy="10" rx="3" ry="5" fill="#FF6B6B" opacity="0.5"/>
    <ellipse cx="38" cy="8" rx="6" ry="10" fill="#FFFBF5" stroke="#2D3436" stroke-width="1.5"/>
    <ellipse cx="38" cy="10" rx="3" ry="5" fill="#FF6B6B" opacity="0.5"/>
    
    <!-- Head -->
    <ellipse cx="30" cy="25" rx="18" ry="15" fill="#FFFBF5" stroke="#2D3436" stroke-width="1.5"/>
    
    <!-- Eyes - big and curious -->
    <circle cx="24" cy="22" r="5" fill="#2D3436"/>
    <circle cx="36" cy="22" r="5" fill="#2D3436"/>
    <circle cx="25" cy="21" r="2" fill="#FFFBF5"/>
    <circle cx="37" cy="21" r="2" fill="#FFFBF5"/>
    
    <!-- Nose -->
    <ellipse cx="30" cy="30" rx="3" ry="2" fill="#FF6B6B"/>
    
    <!-- Paws on line -->
    <ellipse cx="20" cy="40" rx="6" ry="4" fill="#FFFBF5" stroke="#2D3436" stroke-width="1"/>
    <ellipse cx="40" cy="40" rx="6" ry="4" fill="#FFFBF5" stroke="#2D3436" stroke-width="1"/>
  </g>
  
  <!-- Line the squirrel peeks over -->
  <line x1="10" y1="42" x2="190" y2="42" stroke="#E9ECEF" stroke-width="3"/>
  
  <!-- Wordmark below -->
  <text x="100" y="62" text-anchor="middle" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="700" fill="#2D3436">
    Senten<tspan fill="#FF6B6B">se</tspan>
  </text>
</svg>
