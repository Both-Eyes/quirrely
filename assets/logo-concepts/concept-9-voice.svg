<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="voice-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B" />
      <stop offset="100%" style="stop-color:#4ECDC4" />
    </linearGradient>
  </defs>
  
  <!-- Squirrel silhouette -->
  <g transform="translate(5, 8)">
    <!-- Body -->
    <path d="M25 40 Q15 35, 18 25 Q20 15, 28 12 Q35 10, 40 15 Q44 20, 42 30 Q40 38, 30 42 Z" 
          fill="#2D3436"/>
    <!-- Tail -->
    <path d="M25 40 Q12 45, 8 35 Q5 25, 12 18 Q18 12, 20 20" 
          fill="#2D3436"/>
    <!-- Ear -->
    <path d="M32 12 Q36 5, 42 8 Q40 14, 35 15" fill="#2D3436"/>
    <!-- Eye (negative space) -->
    <circle cx="36" cy="22" r="3" fill="#FFFBF5"/>
    <circle cx="37" cy="21" r="1.5" fill="#2D3436"/>
  </g>
  
  <!-- Sound waves -->
  <g stroke="url(#voice-gradient)" fill="none" stroke-width="2" stroke-linecap="round">
    <path d="M48 25 Q52 20, 52 30 Q52 35, 48 30" opacity="0.9"/>
    <path d="M54 22 Q60 15, 60 32 Q60 42, 54 35" opacity="0.7"/>
    <path d="M62 18 Q70 10, 70 35 Q70 50, 62 40" opacity="0.5"/>
  </g>
  
  <!-- Wordmark -->
  <text x="85" y="40" font-family="Outfit, system-ui, sans-serif" font-size="28" font-weight="700" fill="#2D3436">
    Senten<tspan fill="#FF6B6B">se</tspan>
  </text>
</svg>
