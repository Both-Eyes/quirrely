<!--
  LOADING SCREEN COMPONENT
  ========================
  Full-screen loading overlay with animated squirrel logo.
  
  Usage:
  1. Include this component
  2. Call LoadingScreen.show() / LoadingScreen.hide()
-->

<template id="loading-screen-template">
  <div class="loading-screen" id="loading-screen">
    <div class="loading-content">
      <!-- Animated squirrel with pulsing treasure -->
      <svg class="loading-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 135" width="80" height="108">
        <!-- Tail -->
        <path d="M58 112 Q85 98, 94 62 Q100 26, 74 8 Q50 -8, 42 22 Q38 44, 54 60 Q70 78, 62 100 Q58 110, 58 112" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
        
        <!-- Body -->
        <ellipse cx="40" cy="98" rx="22" ry="26" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
        
        <!-- Arms -->
        <path d="M20 68 Q12 72, 14 80 Q16 86, 24 88 L32 86" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M60 68 Q68 72, 66 80 Q64 86, 56 88 L48 86" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.5" stroke-linecap="round"/>
        
        <!-- Paws -->
        <ellipse cx="28" cy="86" rx="7" ry="5" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1"/>
        <ellipse cx="52" cy="86" rx="7" ry="5" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1"/>
        
        <!-- Treasure with pulse -->
        <ellipse class="treasure-glow" cx="40" cy="84" rx="15" ry="11" fill="#FF6B6B" opacity="0.15"/>
        <ellipse class="treasure" cx="40" cy="78" rx="9" ry="4" fill="#FF6B6B"/>
        <path d="M34 82 Q33 90, 40 94 Q41 92, 40 82 Z" fill="#FF8E8E" opacity="0.5"/>
        
        <!-- Head -->
        <ellipse cx="40" cy="50" rx="22" ry="20" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.2"/>
        
        <!-- Ears -->
        <ellipse cx="24" cy="30" rx="8" ry="14" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1"/>
        <ellipse cx="56" cy="30" rx="8" ry="14" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1"/>
        <ellipse cx="24" cy="33" rx="4" ry="9" fill="#D4CCC4" opacity="0.5"/>
        <ellipse cx="56" cy="33" rx="4" ry="9" fill="#D4CCC4" opacity="0.5"/>
        
        <!-- Eyes -->
        <ellipse cx="32" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <ellipse cx="48" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <circle cx="33" cy="46.5" r="2" fill="#FFFFFF"/>
        <circle cx="49" cy="46.5" r="2" fill="#FFFFFF"/>
        
        <!-- Nose -->
        <ellipse cx="40" cy="60" rx="4.5" ry="3.5" fill="#4A4A4A"/>
      </svg>
      
      <p class="loading-text">Analyzing your writing...</p>
    </div>
  </div>
</template>

<style>
  .loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 251, 245, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s, visibility 0.3s;
  }
  
  .loading-screen.visible {
    opacity: 1;
    visibility: visible;
  }
  
  .loading-content {
    text-align: center;
  }
  
  .loading-logo {
    animation: bounce 1.5s ease-in-out infinite;
  }
  
  .loading-logo .treasure {
    animation: pulse 1.5s ease-in-out infinite;
  }
  
  .loading-logo .treasure-glow {
    animation: glow 1.5s ease-in-out infinite;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  
  @keyframes glow {
    0%, 100% { 
      transform: scale(1);
      opacity: 0.15;
    }
    50% { 
      transform: scale(1.3);
      opacity: 0;
    }
  }
  
  .loading-text {
    margin-top: 1.5rem;
    color: #636E72;
    font-size: 1rem;
    animation: fade 1.5s ease-in-out infinite;
  }
  
  @keyframes fade {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>

<script>
const LoadingScreen = {
  element: null,
  
  init() {
    if (this.element) return;
    
    const template = document.getElementById('loading-screen-template');
    if (!template) return;
    
    document.body.appendChild(template.content.cloneNode(true));
    this.element = document.getElementById('loading-screen');
  },
  
  show(message = 'Analyzing your writing...') {
    this.init();
    if (this.element) {
      this.element.querySelector('.loading-text').textContent = message;
      this.element.classList.add('visible');
    }
  },
  
  hide() {
    if (this.element) {
      this.element.classList.remove('visible');
    }
  }
};

// Auto-init when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => LoadingScreen.init());
} else {
  LoadingScreen.init();
}
</script>
