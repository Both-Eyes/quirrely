# QUIRRELY HARDENED NGINX SECURITY CONFIGURATION
# Production-ready security configuration with admin access controls
# Version: 1.0 - Post Security Audit

# Rate limiting zones (increased strictness)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=1r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Geo-blocking for admin endpoints (allowlist approach)
geo $admin_allowed {
    default 0;
    # Office/VPN IP ranges - UPDATE THESE WITH YOUR ACTUAL IPs
    192.168.1.0/24 1;        # Office network
    10.0.0.0/8 1;            # VPN network
    172.16.0.0/12 1;         # Docker/internal
    127.0.0.1 1;             # Localhost
    # Add your specific admin IP addresses here:
    # 203.0.113.10 1;        # Admin workstation 1
    # 203.0.113.20 1;        # Admin workstation 2
}

# SSL configuration (hardened)
ssl_protocols TLSv1.3 TLSv1.2;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;

# Enhanced security headers
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none';" always;

# Main application server
server {
    listen 443 ssl http2;
    server_name quirrely.com www.quirrely.com;
    
    ssl_certificate /etc/letsencrypt/live/quirrely.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quirrely.com/privkey.pem;
    
    root /var/www/quirrely;
    index index.html;
    
    # Connection limits
    limit_conn conn_limit 20;
    
    # Block common attack patterns and sensitive files
    location ~* \.(git|env|htaccess|htpasswd|ini|log|sh|sql|bak|key|pem|p12|pfx)$ {
        deny all;
        return 404;
    }
    
    location ~* /(\.git|\.env|config|database|backend|scripts|admin|secure)/ {
        deny all;
        return 404;
    }
    
    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # Blog and legal pages
    location /blog/ { 
        try_files $uri $uri/ $uri.html =404; 
    }
    location ~ ^/(auth|billing|legal)/ { 
        try_files $uri $uri.html =404; 
    }
    
    # Frontend routes
    location / { 
        try_files $uri $uri.html /index.html; 
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# API server with enhanced security
server {
    listen 443 ssl http2;
    server_name api.quirrely.com;
    
    ssl_certificate /etc/letsencrypt/live/quirrely.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quirrely.com/privkey.pem;
    
    # Stricter connection limits for API
    limit_conn conn_limit 15;
    
    # Block sensitive files
    location ~* \.(env|git|sql|bak|key|pem)$ { 
        deny all; 
        return 404; 
    }
    
    # WebSocket with authentication (to be secured in backend)
    location /ws/ { 
        # Note: WebSocket authentication implemented in backend middleware
        proxy_pass http://127.0.0.1:8000; 
        proxy_http_version 1.1; 
        proxy_set_header Upgrade $http_upgrade; 
        proxy_set_header Connection "upgrade"; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s; 
    }
    
    # CRITICAL: Admin endpoints with IP whitelisting
    location ~ ^/api/(admin|secure)/ {
        # Strict IP whitelisting for admin access
        if ($admin_allowed = 0) {
            return 403;
        }
        
        # Extremely strict rate limiting
        limit_req zone=admin_limit burst=2 nodelay;
        
        # Additional security headers for admin
        add_header X-Admin-Access "restricted" always;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-IP-Verified "true";
    }
    
    # Regular API endpoints
    location / { 
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://127.0.0.1:8000; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
        
        # Security headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name quirrely.com www.quirrely.com api.quirrely.com;
    return 301 https://$host$request_uri;
}

# Block direct IP access
server {
    listen 443 ssl http2 default_server;
    ssl_certificate /etc/letsencrypt/live/quirrely.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quirrely.com/privkey.pem;
    return 444;
}