# LNCP Nginx Security Configuration
# This provides the network-level security layer

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# SSL configuration (use modern settings)
ssl_protocols TLSv1.3 TLSv1.2;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;

# Security headers
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;

server {
    listen 443 ssl http2;
    server_name yoursite.com;
    
    ssl_certificate /etc/letsencrypt/live/yoursite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoursite.com/privkey.pem;
    
    # Client certificate authentication (optional but recommended)
    # ssl_client_certificate /etc/nginx/ssl/ca.crt;
    # ssl_verify_client optional;
    
    root /var/www/lncp/public;
    
    # Connection limits
    limit_conn conn_limit 10;
    
    # Block common attack patterns
    location ~* \.(git|env|htaccess|htpasswd|ini|log|sh|sql|bak)$ {
        deny all;
        return 404;
    }
    
    # Block access to sensitive directories
    location ~ ^/(lncp|backend|data|scripts|admin)/ {
        deny all;
        return 404;
    }
    
    # Public frontend (static files only)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API endpoint (rate limited)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Don't expose internal errors
        proxy_intercept_errors on;
        error_page 500 502 503 504 /50x.html;
    }
    
    # Secure admin gateway (heavily rate limited)
    location ~ ^/gate/([a-zA-Z0-9_-]+)$ {
        # Strict rate limiting
        limit_req zone=auth_limit burst=3 nodelay;
        
        # IP whitelist (update with your Tailscale IPs)
        # allow 100.x.x.x;
        # allow 100.x.x.y;
        # deny all;
        
        # Client certificate required (if configured)
        # if ($ssl_client_verify != SUCCESS) {
        #     return 403;
        # }
        
        proxy_pass http://127.0.0.1:8000/secure/gate/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
    }
    
    # Secure command center (session required)
    location /secure/ {
        # Rate limiting
        limit_req zone=auth_limit burst=10 nodelay;
        
        # IP whitelist
        # allow 100.x.x.x;
        # deny all;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Session cookie validation happens in application
    }
    
    # Error pages
    location = /50x.html {
        root /var/www/lncp/error;
        internal;
    }
    
    # Health check (for load balancers)
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yoursite.com;
    return 301 https://$server_name$request_uri;
}

# Block direct IP access
server {
    listen 443 ssl http2 default_server;
    ssl_certificate /etc/letsencrypt/live/yoursite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoursite.com/privkey.pem;
    return 444;
}
