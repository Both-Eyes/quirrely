  <title>Reset Password | Quirrely</title>
  <style>
    :root { --bg: #FFFBF5; --ink: #2D3436; --primary: #FF6B6B; --muted: #636E72; --border: #E9ECEF; --success: #00B894; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .logo { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
    .logo span { color: var(--primary); }
    h1 { font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.875rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }
    input:focus { outline: none; border-color: var(--primary); }
    .btn { width: 100%; padding: 1rem; border: none; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #ff5252; }
    .links { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .links a { color: var(--primary); text-decoration: none; }
    .success { background: #F0FFF4; border: 1px solid #9AE6B4; color: #276749; padding: 1rem; border-radius: 8px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 365 100" width="140" height="41" style="vertical-align: middle;">

        <ellipse cx="52" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
        <ellipse cx="40" cy="78" rx="9" ry="4" fill="#E85A5A"/><rect x="38.5" y="74" width="3" height="4" rx="1.5" fill="#D4504A"/><path d="M31 78 Q30 94, 40 99 Q50 94, 49 78 Z" fill="#FF6B6B"/>
        <ellipse cx="40" cy="50" rx="22" ry="20" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.4"/>
        <ellipse cx="24" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="56" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="32" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <ellipse cx="48" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <circle cx="33" cy="46.5" r="2" fill="#FFF"/>
        <circle cx="49" cy="46.5" r="2" fill="#FFF"/>
        <ellipse cx="40" cy="60" rx="4.5" ry="3.5" fill="#4A4A4A"/>
      </g>
      <text x="105" y="62" font-family="system-ui, sans-serif" font-size="46" font-weight="700" fill="#2D3436">Quir<tspan fill="#FF6B6B">rel</tspan><tspan fill="#2D3436" font-style="italic" font-weight="500">ly</tspan></text>
    </svg></div>
    <h1>Reset your password</h1>
    <p class="subtitle">Enter your email and we will send you a reset link</p>
    
    <div class="success" id="success">Check your email for a reset link!</div>
    
    <form id="reset-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>
    
    <div class="links">
      <a href="/auth/login">Back to login</a>
    </div>
  </div>
  
  <script>
    document.getElementById('reset-form').addEventListener('submit', function(e) {
      e.preventDefault();
      // TODO: Connect to auth provider
      document.getElementById('success').style.display = 'block';
      this.style.display = 'none';
    });
  </script>
