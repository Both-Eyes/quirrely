<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/css/compat.css">
  <script src="/assets/js/compat.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
  <title>Sign In | Quirrely</title>
  <meta name="description" content="Sign in to your Quirrely account to access your writing profile and dashboard.">
  <style>
    :root { --bg: #FFFBF5; --card: #FFFFFF; --ink: #2D3436; --muted: #636E72; --primary: #FF6B6B; --pro: #FF6B6B; --border: #E9ECEF; --error: #E74C3C; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    
    .header { padding: 1rem 2rem; }
    .logo { font-size: 1.25rem; font-weight: 700; text-decoration: none; color: var(--ink); }
    .logo span { color: var(--primary); }
    
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    
    .auth-card { background: var(--card); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    
    .auth-card h1 { font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
    .auth-card .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    
    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error-msg.visible { display: block; }
    
    .submit-btn { width: 100%; padding: 0.875rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover { background: #FF5252; }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    
    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 1rem; }
    
    .alt-action { text-align: center; color: var(--muted); font-size: 0.9rem; }
    .alt-action a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .alt-action a:hover { text-decoration: underline; }
    
    .forgot-link { display: block; text-align: right; font-size: 0.85rem; color: var(--muted); text-decoration: none; margin-top: 0.5rem; }
    .forgot-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 365 100" width="140" height="41" style="vertical-align: middle;">
      <g transform="translate(5, 2) scale(0.7)">
        <path d="M58 112 Q85 98, 94 62 Q100 26, 74 8 Q50 -8, 42 22 Q38 44, 54 60 Q70 78, 62 100 Q58 110, 58 112" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.4"/>
        <ellipse cx="40" cy="98" rx="22" ry="26" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.4"/>
        <path d="M20 68 Q12 72, 14 80 Q16 86, 24 88 L32 86" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.8"/>
        <path d="M60 68 Q68 72, 66 80 Q64 86, 56 88 L48 86" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.8"/>
        <ellipse cx="28" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
        <ellipse cx="52" cy="86" rx="7" ry="5" fill="#FFFEF9"/>
        <ellipse cx="40" cy="78" rx="9" ry="4" fill="#E85A5A"/><rect x="38.5" y="74" width="3" height="4" rx="1.5" fill="#D4504A"/><path d="M31 78 Q30 94, 40 99 Q50 94, 49 78 Z" fill="#FF6B6B"/>
        <ellipse cx="40" cy="50" rx="22" ry="20" fill="#FFFEF9" stroke="#E0DBD5" stroke-width="1.4"/>
        <ellipse cx="24" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="56" cy="30" rx="8" ry="14" fill="#D4CCC4" opacity="0.6"/>
        <ellipse cx="32" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <ellipse cx="48" cy="48" rx="5.5" ry="6" fill="#1a1a1a"/>
        <circle cx="33" cy="46.5" r="2" fill="#FFF"/>
        <circle cx="49" cy="46.5" r="2" fill="#FFF"/>
        <ellipse cx="40" cy="60" rx="4.5" ry="3.5" fill="#4A4A4A"/>
      </g>
      <text x="105" y="62" font-family="system-ui, sans-serif" font-size="46" font-weight="700" fill="#2D3436">Quir<tspan fill="#FF6B6B">rel</tspan><tspan fill="#2D3436" font-style="italic" font-weight="500">ly</tspan></text>
    </svg></a>
  </header>
  
  <main class="main">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to access your writing profile</p>
      
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
          <a href="/auth/reset.html" class="forgot-link">Forgot password?</a>
        </div>
        
        <div class="error-msg" id="error-msg">Invalid email or password. Please try again.</div>
        
        <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
      </form>
      
      <div class="divider"><span>or</span></div>
      
      <p class="alt-action">
        Don't have an account? <a href="/auth/signup.html">Sign up free</a>
      </p>
    </div>
  </main>
  
  <script src="/frontend/auth-state.js"></script>
  <script>
    // Redirect if already logged in
    if (AuthState.isLoggedIn()) {
      window.location.href = AuthState.getPostLoginRedirect();
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';
      errorMsg.classList.remove('visible');
      
      try {
        await AuthState.login(email, password);
        
        // Redirect to intended destination or dashboard
        const redirect = AuthState.getPostLoginRedirect();
        AuthState.clearPostLoginRedirect();
        window.location.href = redirect;
        
      } catch (error) {
        errorMsg.textContent = error.message || 'Invalid email or password.';
        errorMsg.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    }
  </script>

  <footer style="text-align: center; padding: 1.5rem; margin-top: 2rem; border-top: 1px solid #E9ECEF; color: #636E72; font-size: 0.85rem;">
    <a href="/" style="color: inherit; text-decoration: none;">Quirrely</a> ·

  </footer>
</body>
</html>
