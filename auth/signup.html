  <style>
    :root { --bg: #FFFBF5; --card: #FFFFFF; --ink: #2D3436; --muted: #636E72; --primary: #FF6B6B; --pro: #FF6B6B; --border: #E9ECEF; --error: #E74C3C; --success: #00B894; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito Sans', -apple-system, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    
    .header { padding: 1rem 2rem; }
    .logo { font-size: 1.25rem; font-weight: 700; text-decoration: none; color: var(--ink); }
    .logo span { color: var(--primary); }
    
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    
    .auth-card { background: var(--card); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    
    .auth-card h1 { font-family: 'Outfit', -apple-system, sans-serif; font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
    .auth-card .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; }
    
    .benefits { background: #F0FFF4; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    .benefits p { font-size: 0.85rem; color: var(--success); margin: 0; display: flex; align-items: center; gap: 0.5rem; }
    .benefits p + p { margin-top: 0.5rem; }
    
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    
    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error-msg.visible { display: block; }
    
    .submit-btn { width: 100%; padding: 0.875rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover { background: #FF5252; }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    
    .terms { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 1rem; }
    .terms a { color: var(--primary); text-decoration: none; }
    
    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 1rem; }
    
    .alt-action { text-align: center; color: var(--muted); font-size: 0.9rem; }
    .alt-action a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .alt-action a:hover { text-decoration: underline; }

    .social-buttons { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 0.5rem; }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s, border-color 0.2s; color: var(--ink); }
    .social-btn:hover { background: #F8F9FA; border-color: #CED4DA; }
    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  </style>
</head>

  <script src="/frontend/auth-state.js"></script>
  <script>
    // Checkout redirect: capture tier from URL or sessionStorage
    var checkout_tier = new URLSearchParams(window.location.search).get('tier') || sessionStorage.getItem('quirrely_checkout_tier') || '';
    if (checkout_tier) sessionStorage.setItem('quirrely_checkout_tier', checkout_tier);

    // Redirect if already logged in
    if (AuthState.isLoggedIn()) {
      window.location.href = checkout_tier ? '/billing/upgrade.html?tier=' + checkout_tier : '/dashboard';
    }

    async function socialLogin(provider) {
      try {
        const res = await fetch('/api/v2/auth/login/' + provider);
        const data = await res.json();
        if (data.redirect_url) window.location.href = data.redirect_url;
        else throw new Error(data.detail || 'Failed to start signup');
      } catch (e) {
        var errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = e.message || 'Social login unavailable';
        errorMsg.classList.add('visible');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/api/v2/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, display_name: name })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Could not create account');

        // Signup requires email verification — show message then redirect to login
        submitBtn.textContent = 'Check your email!';
        errorMsg.classList.remove('visible');
        setTimeout(function() {
          window.location.href = '/auth/login.html' + (checkout_tier ? '?tier=' + checkout_tier : '');
        }, 2000);

      } catch (error) {
        errorMsg.textContent = error.message || 'Could not create account. Please try again.';
        errorMsg.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    }
  </script>
