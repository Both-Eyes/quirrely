[build]
  publish = "."

[[redirects]]
  from = "/blog/how-*-*-writers-write"
  to = "/blog/blog-post.html"
  status = 200

[[redirects]]
  from = "/writer/*"
  to = "/blog/user-profile-public.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/legal/terms.html"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/legal/privacy.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
