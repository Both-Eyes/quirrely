<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background:#FFFBF5;font-family:'Nunito Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;}
.splash{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100%;text-align:center;padding:2rem;}
.splash.visible{display:flex;}
.splash-logo{margin-bottom:1.5rem;}
.splash-title{font-size:2rem;font-weight:800;color:#1a1a1a;margin-bottom:0.5rem;letter-spacing:-0.02em;}
.splash-title span{color:#FF6B6B;}
.splash-sub{font-size:1.05rem;color:#666;margin-bottom:2.5rem;max-width:420px;line-height:1.5;}
.splash-btns{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:320px;}
.btn-primary{background:#FF6B6B;color:#fff;border:none;padding:1rem 1.5rem;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{background:transparent;color:#1a1a1a;border:2px solid #ddd;padding:1rem 1.5rem;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:border-color .2s;}
.btn-secondary:hover{border-color:#999;}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 80 120" width="60" height="90" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="95" rx="22" ry="18" fill="#f5e6c8"/>
      <path d="M18 78 Q10 55 20 40 Q30 25 40 28 Q50 25 60 40 Q70 55 62 78 Z" fill="#f5e6c8"/>
      <ellipse cx="28" cy="30" rx="7" ry="10" fill="#f5e6c8"/>
      <ellipse cx="52" cy="30" rx="7" ry="10" fill="#f5e6c8"/>
      <ellipse cx="28" cy="30" rx="4" ry="6" fill="#e8d5b0"/>
      <ellipse cx="52" cy="30" rx="4" ry="6" fill="#e8d5b0"/>
      <circle cx="32" cy="52" r="5" fill="white"/>
      <circle cx="48" cy="52" r="5" fill="white"/>
      <circle cx="33" cy="52" r="3" fill="#2a1a0e"/>
      <circle cx="49" cy="52" r="3" fill="#2a1a0e"/>
      <ellipse cx="40" cy="61" rx="3" ry="2" fill="#c4956a"/>
      <path d="M15 70 Q5 50 12 35 Q8 20 20 18 Q18 30 22 38" fill="#d4956a" opacity="0.9"/>
      <path d="M65 70 Q75 50 68 35 Q72 20 60 18 Q62 30 58 38" fill="#d4956a" opacity="0.9"/>
      <ellipse cx="28" cy="100" rx="6" ry="4" fill="#e8d5b0"/>
      <ellipse cx="52" cy="100" rx="6" ry="4" fill="#e8d5b0"/>
      <path d="M34 78 Q40 82 46 78" stroke="#c4956a" stroke-width="1.5" fill="none"/>
      <path d="M36 74 Q40 71 44 74" stroke="#c4956a" stroke-width="1" fill="none"/>
      <ellipse cx="40" cy="87" rx="8" ry="6" fill="#FF6B6B" opacity="0.85"/>
      <path d="M36 87 Q40 83 44 87 Q40 91 36 87Z" fill="#e85555"/>
    </svg>
  </div>
  <h1 class="splash-title">Quir<span>re</span>ly</h1>
  <p class="splash-sub">The curious way to find your writing voice.</p>
  <div class="splash-btns">
    <button class="btn-primary" onclick="goAnalyse()">Analyse your writing</button>
    <button class="btn-secondary" onclick="goBlog()">Read the blog free</button>
  </div>
</div>
<script>
(function(){
  try {
    var s = localStorage.getItem('quirrely_session');
    if (s) { var t = JSON.parse(s).token; if (t) { window.location.replace('/frontend/dashboard.html'); return; } }
  } catch(e) {}
  if (localStorage.getItem('quirrely_visited')) { window.location.replace('/blog'); return; }
  document.getElementById('splash').classList.add('visible');
})();
function goAnalyse(){
  localStorage.setItem('quirrely_visited','1');
  window.location.href='/auth/signup.html';
}
function goBlog(){
  localStorage.setItem('quirrely_visited','1');
  window.location.href='/blog';
}
</script>
</body>
</html>
