<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/css/compat.css">
  <script src="/assets/js/compat.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Pro! | Quirrely</title>
  <style>
    :root { --bg: #FFFBF5; --ink: #2D3436; --primary: #FF6B6B; --pro: #FF6B6B; --success: #00B894; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .card { background: white; border-radius: 20px; padding: 3rem; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--pro); }
    p { color: #636E72; margin-bottom: 2rem; }
    .features { text-align: left; background: #F8F7FF; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
    .feature { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .feature:last-child { margin-bottom: 0; }
    .feature::before { content: '✓'; color: var(--success); font-weight: bold; }
    .btn { display: inline-block; background: var(--pro); color: white; padding: 1rem 2rem; border-radius: 30px; text-decoration: none; font-weight: 600; }
    .btn:hover { background: #5b4cdb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Welcome to Pro!</h1>
    <p>Your subscription is now active. Here is what you can do:</p>
    <div class="features">
      <div class="feature">Access your full writing analysis</div>
      <div class="feature">Compare your profile with others</div>
      <div class="feature">Create your public writer profile</div>
      <div class="feature">Submit to be a Featured Writer</div>
    </div>
    <a href="/" class="btn">Go to Dashboard</a>
  </div>
