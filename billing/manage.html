  <title>Manage Subscription | Quirrely</title>
  <style>
    :root { --bg: #FFFBF5; --ink: #2D3436; --primary: #FF6B6B; --muted: #636E72; --border: #E9ECEF; --pro: #FF6B6B; --success: #00B894; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
    .logo { font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; }
    .logo a { text-decoration: none; color: inherit; }
    .logo span { color: var(--primary); }
    h1 { font-size: 1.75rem; margin-bottom: 2rem; }
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .badge { background: var(--success); color: white; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .info-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 25px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: white; border: 1px solid var(--border); color: var(--ink); }
    .btn-danger { background: white; border: 1px solid var(--primary); color: var(--primary); }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    @media (max-width: 600px) { .actions { flex-direction: column; } .btn { width: 100%; } }
  </style>
</head>

    </svg></a></div>
    <h1>Manage Subscription</h1>
    <div class="card">
      <div class="card-header">
        <span>Current Plan</span>
        <span class="badge">Active</span>
